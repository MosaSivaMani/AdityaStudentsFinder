<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Photo Finder</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#667eea,#764ba2);
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.app{

width:100%;
max-width:420px;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);

border-radius:25px;

box-shadow:0 20px 50px rgba(0,0,0,0.3);

padding:25px;
color:white;

}

.header{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:20px;

}

.title{
font-size:20px;
font-weight:600;
}

.icon{
cursor:pointer;
font-size:20px;
}

.searchBox{

background:rgba(255,255,255,0.2);
padding:12px;
border-radius:12px;

display:flex;
align-items:center;
gap:10px;

}

.searchBox input{

background:none;
border:none;
outline:none;
color:white;
font-size:15px;
width:100%;

}

.searchBox input::placeholder{
color:#ddd;
}

.btn{

margin-top:15px;

width:100%;
padding:12px;

border:none;
border-radius:12px;

background:white;
color:#333;

font-weight:500;

cursor:pointer;

}

.photoArea{

margin-top:25px;

text-align:center;

}

img{

width:200px;
border-radius:20px;

box-shadow:0 15px 35px rgba(0,0,0,0.4);

display:none;

}

.error{

margin-top:15px;

color:#ffd3d3;

display:none;

}

.actions{

margin-top:20px;

display:flex;
gap:10px;

}

.actions button{

flex:1;

padding:10px;

border:none;
border-radius:10px;

background:rgba(255,255,255,0.25);

color:white;

cursor:pointer;

}

.footer{

margin-top:25px;

display:flex;

justify-content:space-around;

font-size:14px;

opacity:.9;

}

.footer div{
cursor:pointer;
}

.dark{

background:#111;

}

</style>

</head>

<body>

<div class="app">

<div class="header">

<div class="title">🎓 Student Finder</div>

<div class="icon" onclick="toggleMode()">🌙</div>

</div>

<div class="searchBox">

🔎

<input id="roll" placeholder="Enter Roll Number">

</div>

<button class="btn" onclick="loadPhoto()">Search Photo</button>

<div class="photoArea">

<img id="photo">

<div class="error" id="error">Photo not found</div>

</div>

<div class="actions">

<button onclick="downloadPhoto()">Download</button>

<button onclick="copyURL()">Copy Link</button>

<button onclick="clearPhoto()">Clear</button>

</div>

<div class="footer">

<div onclick="goHome()">🏠 Home</div>

<div onclick="focusSearch()">🔍 Search</div>

<div onclick="saveFav()">⭐ Save</div>

</div>

</div>

<script>

const input=document.getElementById("roll")
const img=document.getElementById("photo")
const error=document.getElementById("error")

let currentURL=""

input.addEventListener("keypress",e=>{
if(e.key==="Enter") loadPhoto()
})

function loadPhoto(){

const roll=input.value.trim()

if(!roll) return

const url=`https://info.aec.edu.in/aec/StudentPhotos/${roll}.jpg`

currentURL=url

img.src=url

img.onload=()=>{
img.style.display="block"
error.style.display="none"
}

img.onerror=()=>{
img.style.display="none"
error.style.display="block"
}

}

function downloadPhoto(){

if(!currentURL) return

const a=document.createElement("a")

a.href=currentURL

a.download="student-photo.jpg"

a.click()

}

function copyURL(){

if(!currentURL) return

navigator.clipboard.writeText(currentURL)

alert("Copied")

}

function clearPhoto(){

input.value=""

img.style.display="none"

error.style.display="none"

}

function focusSearch(){

input.focus()

}

function goHome(){

window.scrollTo({top:0,behavior:"smooth"})

}

function saveFav(){

if(!currentURL) return

localStorage.setItem("favPhoto",currentURL)

alert("Saved")

}

function toggleMode(){

document.body.classList.toggle("dark")

}

</script>

</body>
</html>
